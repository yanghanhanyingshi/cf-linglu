name: 灵鹿IP

于:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  collect-ips:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3
        
    - name: Run IP Test
      run: |
        python linglu.py
        
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: ip-results
        path: |
          linglu-01.txt
          linglu-02.txt
          linglu-03.txt
          linglu-04.txt
          linglu-05.txt
          linglu.log
          Cache.json
          
    - name: Commit results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add linglu-01.txt linglu-02.txt linglu-03.txt linglu-04.txt linglu-05.txt Cache.json
        git diff --staged --quiet || git commit -m "Update IP results - $(date)"
        git push
