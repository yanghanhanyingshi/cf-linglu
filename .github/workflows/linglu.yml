- name: Commit results
  run: |
    git config --local user.email "action@github.com"
    git config --local user.name "GitHub Action"
    
    git pull --rebase origin main
    
    # 只添加确实存在的文件（防止 git add 报错）
    for file in linglu-01.txt linglu-02.txt linglu-03.txt linglu-04.txt linglu-05.txt Cache.json; do
      if [ -f "$file" ]; then
        git add "$file"
      fi
    done
    
    if git diff --staged --quiet; then
      echo "✅ 没有变化，跳过提交"
    else
      git commit -m "Update IP results - $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
      git push origin main
      echo "✅ 提交成功"
    fi
