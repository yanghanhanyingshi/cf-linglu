name: 灵鹿IP爬取

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  collect-ips:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3 pybase64
        
    - name: Run IP Test
      run: |
        python linglu.py
        
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: ip-results
        path: |
          output/*.txt
          output/Base64/*.txt
          
    - name: Commit results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 添加所有 output 目录下的文件（包括子目录）
        git add output/
        # 如果有其他需要提交的根目录文件可在此添加，但脚本没有生成
        git diff --staged --quiet || git commit -m "Update IP results - $(date)"
        git push
