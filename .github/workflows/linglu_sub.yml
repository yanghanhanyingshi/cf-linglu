name: 节点采集
on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 */8 * * *'   # 每8小时
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖库
        run: |
          pip install requests pybase64 --upgrade

      - name: 执行订阅合并脚本
        run: python linglu_sub.py

      - name: 上传生成文件产物
        uses: actions/upload-artifact@v4
        with:
          name: proxy-config-files
          path: output/

      - name: 提交并强制推送更新到仓库
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add output/
          git commit -m "Auto update proxy config files" || echo "无文件更新，跳过提交"
          git push --force origin HEAD:main   # 强制覆盖远程 main 分支
