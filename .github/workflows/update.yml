name: Update IP List

on:
schedule:
- cron: "0 */12 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Dependencies
    run: |
      pip install -r requirements.txt

  - name: Run Spider
    run: |
      python main.py

  - name: Commit Changes
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"

      git add all.txt

      git diff --staged --quiet || \
      git commit -m "Auto update IP list"

      git push
