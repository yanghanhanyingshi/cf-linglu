name: 麒麟优选-ip

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Playwright 环境
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 麒麟IP优选采集（去重+格式化）
        run: python qilin.py

      - name: 提交更新
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          BEIJING_TIME=$(TZ=Asia/Shanghai date "+%m-%d %H:%M")
          echo "⏰ 当前北京时间：$BEIJING_TIME"

          git add qilin_ip.txt

          if git diff --cached --quiet qilin_ip.txt; then
            echo "✅ IP无变化，无需更新"
          else
            git commit -m "麒麟优选IP ${BEIJING_TIME}"
            git pull --rebase origin main
            git push origin main
            echo "✅ 提交成功"
          fi
