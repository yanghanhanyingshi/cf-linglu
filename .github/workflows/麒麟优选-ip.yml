- name: 提交更新
  run: |
    git config --global user.name "GitHub Action"
    git config --global user.email "action@github.com"
    BEIJING_TIME=$(TZ=Asia/Shanghai date "+%m-%d %H:%M")
    echo "⏰ 当前北京时间：$BEIJING_TIME"

    git add qilin_ip.txt qilin_all.txt

    # 检查暂存区是否有新增或修改
    if git diff --cached --quiet; then
      # 如果文件不存在于仓库中（从未提交），则视为变化
      if ! git ls-files --error-unmatch qilin_ip.txt >/dev/null 2>&1; then
        echo "🔄 文件未追踪，强制提交..."
        git commit -m "麒麟优选IP ${BEIJING_TIME} (首次)"
        git pull --rebase origin main
        git push origin main
      else
        echo "✅ 文件无变化，无需更新"
      fi
    else
      echo "🔄 检测到变化，提交更新..."
      git commit -m "麒麟优选IP ${BEIJING_TIME}"
      git pull --rebase origin main
      git push origin main
    fi
