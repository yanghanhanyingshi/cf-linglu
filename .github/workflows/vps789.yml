name: vps789

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装环境
        run: |
          pip install playwright requests urllib3
          playwright install chromium
          playwright install-deps chromium

      - name: 抓取并测速，生成文件
        run: python crawler.py

      - name: 提交变更
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          BEIJING_TIME=$(TZ=Asia/Shanghai date "+%m-%d %H:%M")
          echo "当前北京时间: $BEIJING_TIME"

          git add vps789.txt fastest50.txt fastest100.txt

          if git diff --cached --quiet; then
            echo "所有文件内容无变化，跳过提交。"
          else
            git commit -m "vps789 update $BEIJING_TIME"
            git pull --rebase origin main
            git push origin main
            echo "提交成功。"
          fi
