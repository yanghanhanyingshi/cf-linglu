name: 稳定版爬取 Cloudflare IP

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:        # 支持手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 授予写入权限

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0      # 完整历史，便于推送

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4 lxml

    - name: 运行爬虫（稳定模式）
      run: |
        set -e
        echo "=== 开始运行爬虫 ==="
        python -u 6610000.py
        echo "=== 爬虫运行结束 ==="

    - name: 检查输出文件（关键步骤）
      run: |
        echo "=== 当前目录文件列表 ==="
        ls -al
        
        echo "=== 检查 IP 文件 ==="
        if [ -f 6610000ip.txt ]; then
          echo "✅ IP文件存在"
          echo "内容行数: $(wc -l < 6610000ip.txt)"
          echo "前5行预览:"
          head -5 6610000ip.txt
        else
          echo "❌ IP文件不存在"
          exit 1
        fi
        
        echo "=== 检查域名文件 ==="
        if [ -f 6610000cf.txt ]; then
          echo "✅ 域名文件存在"
          echo "内容行数: $(wc -l < 6610000cf.txt)"
          echo "前5行预览:"
          head -5 6610000cf.txt
        else
          echo "❌ 域名文件不存在"
          exit 1
        fi

    - name: 提交并推送（稳定版）
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # 添加两个文件（即使为空也添加）
        git add 6610000ip.txt 6610000cf.txt

        # 检查是否有变化
        if git diff --cached --quiet; then
          echo "✅ 没有检测到文件变更，跳过提交"
          exit 0
        fi

        # 提交更改
        git commit -m "稳定版自动更新 IP/域名 [skip ci]"

        # ⭐ 关键：强制同步远端，避免推送冲突
        echo "=== 同步远程仓库 ==="
        git pull origin main --rebase || git pull origin master --rebase || true

        # 推送更改
        echo "=== 推送到远程仓库 ==="
        git push origin HEAD:main || git push origin HEAD:master

        echo "✅ 提交和推送完成"
