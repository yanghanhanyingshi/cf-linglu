# .github/workflows/6610000.yml
name: 定时爬取 Cloudflare 优选 IP 和域名

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:        # 支持手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml

    - name: 运行爬虫脚本（带详细日志）
      run: |
        set -e
        echo "=== 开始执行爬虫 ==="
        python -u 6610000.py
        echo "=== 爬虫执行结束 ==="
        echo "=== 检查生成的文件 ==="
        ls -al *.txt || echo "未找到 .txt 文件"

    - name: 调试：强制显示文件状态
      if: always()
      run: |
        echo "=== 当前目录所有文件 ==="
        ls -al
        echo "=== 查找所有 .txt 文件 ==="
        find . -name "*.txt" -exec ls -l {} \;

    - name: 提交并推送更改（原生Git方式）
      run: |
        # 配置 Git 用户
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 添加所有更改
        git add .
        
        # 检查是否有更改需要提交
        if git diff --cached --quiet; then
          echo "✅ 没有检测到文件变更，跳过提交。"
          exit 0
        fi
        
        # 提交更改
        git commit -m "自动更新 IP 和域名列表 [skip ci]"
        
        # 推送到远程仓库（明确指定分支）
        git push origin HEAD:main || git push origin HEAD:master
        
        echo "✅ 更改已成功推送"
