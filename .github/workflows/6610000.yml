# .github/workflows/6610000.yml
name: 定时爬取 Cloudflare 优选 IP 和域名

on:
  # 定时触发：每6小时运行一次
  schedule:
    - cron: '0 */6 * * *'
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予写入权限
    
    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v4
      with:
        fetch-depth: 0          # 拉取完整历史，避免浅克隆问题
        persist-credentials: true  # 保留 Git 凭证
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
    
    - name: 运行爬虫脚本
      run: |
        python 6610000.py
    
    - name: 自动提交更改
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "自动更新 IP 和域名列表 [skip ci]"
        file_pattern: 6610000ip.txt 6610000cf.txt
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"
        commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
        # 如果文件没有变化，不会创建提交
        skip_fetch: false  # 在提交前先拉取最新更改
        # 可选：只处理特定分支
        # branch: main
