name: 稳定版爬取 Cloudflare IP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4 lxml

    - name: 运行爬虫（稳定模式）
      run: |
        set -e
        python -u 6610000.py

    - name: 检查输出文件
      run: |
        echo "=== 文件检查 ==="
        ls -al
        test -f 6610000ip.txt || (echo "IP文件不存在" && exit 1)
        test -f 6610000cf.txt || (echo "域名文件不存在" && exit 1)

    - name: 提交并推送（稳定版）
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add 6610000ip.txt 6610000cf.txt

        # 没变化直接退出
        if git diff --cached --quiet; then
          echo "no changes"
          exit 0
        fi

        git commit -m "稳定版自动更新 IP/域名 [skip ci]"

        # ⭐关键：强制同步远端
        git pull origin main --rebase || true
        git push origin HEAD:main
