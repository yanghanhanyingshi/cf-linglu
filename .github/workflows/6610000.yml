# .github/workflows/6610000.yml
name: 定时爬取 Cloudflare 优选 IP 和域名

on:
  # 定时触发：每6小时运行一次
  schedule:
    - cron: '0 */6 * * *'
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 明确授予写入权限
    
    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # 拉取完整历史，避免浅克隆导致的问题
        fetch-depth: 0
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
    
    - name: 运行爬虫脚本
      run: |
        python 6610000.py
    
    - name: 提交并推送更新到仓库
      run: |
        # 配置 Git 用户信息
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 添加文件到暂存区
        git add 6610000ip.txt 6610000cf.txt
        
        # 检查是否有文件变更
        if git diff --staged --quiet; then
          echo "没有检测到文件变更，跳过提交。"
          exit 0
        else
          # 有变更，进行提交和推送
          git commit -m "自动更新 IP 和域名列表 [skip ci]"
          
          # 尝试推送，如果远程有更新则先拉取再推送
          git pull --rebase origin main || git pull --rebase origin master
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
