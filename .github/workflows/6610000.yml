# .github/workflows/6610000.yml
name: 定时爬取 Cloudflare 优选 IP 和域名

on:
  # 定时触发：每6小时运行一次
  schedule:
    - cron: '0 */6 * * *'
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
      shell: bash
    
    - name: 运行爬虫脚本（可调试版本）
      run: |
        set -e
        echo "=== 开始执行爬虫 ==="
        python -u 6610000.py
        echo "=== 爬虫执行结束 ==="
      shell: bash
    
    - name: 显示文件状态
      if: always()  # 无论成功失败都执行
      run: |
        echo "=== 当前目录文件列表 ==="
        ls -al
        echo ""
        echo "=== IP文件内容（前5行）==="
        head -5 6610000ip.txt 2>/dev/null || echo "IP文件不存在或为空"
        echo ""
        echo "=== 域名文件内容（前5行）==="
        head -5 6610000cf.txt 2>/dev/null || echo "域名文件不存在或为空"
      shell: bash
    
    - name: 显示错误日志
      if: failure()
      run: |
        echo "=========================================="
        echo "❌ Python 脚本运行失败！"
        echo "=========================================="
        echo "=== 当前目录文件列表 ==="
        ls -al
        echo ""
        echo "=== Python 环境信息 ==="
        python --version
        pip list
      shell: bash
    
    - name: 自动提交更改
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "自动更新 IP 和域名列表 [skip ci]"
        file_pattern: 6610000ip.txt 6610000cf.txt
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"
        commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
        skip_fetch: false
